<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Reading Environment</title>
  <meta name="description"
    content="A beautiful, distraction-free markdown reading environment. Built for absolute focus and editorial typography.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    // Initial theme check (run before body loads to avoid FOUC)
    (function () {
      const theme = localStorage.getItem('lumen_theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <div class="app-container">

    <header class="top-nav">
      <div class="nav-brand">Lumen</div>
      <div class="nav-actions">
        <button id="btn-focus" class="btn-text" title="Toggle Focus Mode (Ctrl+Alt+F)">Focus</button>
        <button id="btn-reset" class="btn-text" title="Clear current document">Reset</button>
        <button id="btn-new-tab" class="btn-text" title="Create a new tab">New Tab</button>
        <button id="btn-undo" class="btn-text" title="Undo inside editor">Undo</button>
        <div class="export-dropdown-container">
          <button id="btn-export" class="btn-text" title="Export Document">Export</button>
          <div class="export-dropdown-menu" id="export-dropdown-menu">
            <button class="export-opt" data-type="pdf">PDF</button>
            <button class="export-opt" data-type="html">HTML</button>
            <button class="export-opt" data-type="md">Markdown</button>
            <button class="export-opt" data-type="txt">Plain Text</button>
          </div>
        </div>
      </div>
    </header>
    <div class="app-body">

      <div id="progress-bar" aria-hidden="true"></div>
      <aside class="sidebar" id="sidebar">
        <button class="btn-pin" id="btn-sidebar-pin" title="Pin sidebar">
          <svg viewBox="0 0 24 24">
            <path fill="currentColor" d="M16 12V4h1v-2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z" />
          </svg>
        </button>
        <nav class="sidebar-nav">
          <button class="sidebar-action" id="btn-paste-sidebar" title="Paste Markdown" data-tooltip="Paste Markdown">
            <svg viewBox="0 0 24 24">
              <path fill="currentColor"
                d="M14.06 9.02l.92.92L5.92 19H5v-.92l9.06-9.06M17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83a.996.996 0 0 0 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 17.25V21h3.75L17.81 9.94l-3.75-3.75z" />
            </svg>
            <span class="action-label">Paste</span>
          </button>

          <button class="sidebar-action" id="btn-upload-sidebar" title="Upload Markdown File"
            data-tooltip="Upload File">
            <svg viewBox="0 0 24 24">
              <path fill="currentColor"
                d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            <span class="action-label">Upload</span>
          </button>

          <button class="sidebar-action" id="btn-print-sidebar" title="Print Document" data-tooltip="Print PDF">
            <svg viewBox="0 0 24 24">
              <path fill="currentColor"
                d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z" />
            </svg>
            <span class="action-label">Print</span>
          </button>

          <button class="sidebar-action" id="btn-theme-sidebar" title="Toggle Theme" data-tooltip="Theme">
            <span class="theme-icon"
              style="display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; flex-shrink:0;"></span>
            <span class="action-label" id="theme-label">Theme</span>
          </button>
        </nav>
        <div class="sidebar-section-divider"></div>
        <div class="sidebar-section" id="section-width">
          <div class="section-header-row" data-tooltip="Reading Width">
            <svg viewBox="0 0 24 24" class="section-icon">
              <path fill="currentColor" d="M2 4h2v16H2V4zm20 0h2v16h-2V4zM8 11h8v2H8v-2z" />
            </svg>
            <span class="action-label section-title"
              style="font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Reading
              Width</span>
          </div>
          <div class="width-selector-container action-label">
            <button class="btn-width-opt" data-width="680">Narrow</button>
            <button class="btn-width-opt" data-width="780">Medium</button>
            <button class="btn-width-opt" data-width="900">Wide</button>
          </div>
        </div>
        <div class="sidebar-section-divider"></div>
        <div class="tabs-section" id="tabs-section" data-tooltip="Tabs">
          <div class="tabs-header">
            <span class="action-label">TABS</span>
          </div>
          <div class="tabs-list" id="tabs-list">
          </div>
        </div>
        <div class="sidebar-section-divider"></div>
        <div class="sidebar-section collapsed" id="section-tools">
          <div class="section-header-row" id="btn-tools-toggle" data-tooltip="Tools">
            <svg viewBox="0 0 24 24" class="section-icon">
              <path fill="currentColor"
                d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.3C.5 6.7.9 9.8 2.9 11.8c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.4-2.4c.4-.4.4-1.1 0-1.5z" />
            </svg>
            <span class="action-label section-title"
              style="font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex: 1;">Tools</span>
            <svg viewBox="0 0 24 24" class="chevron-icon action-label">
              <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
            </svg>
          </div>
          <div class="tools-container action-label" id="tools-container" style="display: none;">
            <div class="tool-widget" id="tool-stopwatch" style="margin-bottom: 12px;">
              <div class="tool-title">Stopwatch</div>
              <div class="tool-time-display" id="stopwatch-display">00:00:00</div>
              <div class="tool-controls">
                <button class="btn-tool" id="btn-stopwatch-toggle">Start</button>
                <button class="btn-tool" id="btn-stopwatch-reset">Reset</button>
              </div>
            </div>

            <div class="tool-widget" id="tool-timer" style="margin-bottom: 12px;">
              <div class="tool-title">Timer</div>
              <div class="tool-time-display" id="timer-display">00:00</div>
              <div class="timer-presets">
                <button class="btn-preset" data-mins="5">5m</button>
                <button class="btn-preset" data-mins="10">10m</button>
                <button class="btn-preset" data-mins="15">15m</button>
                <button class="btn-preset" data-mins="25">25m</button>
                <button class="btn-preset" data-mins="45">45m</button>
                <button class="btn-preset" data-mins="60">60m</button>
              </div>
              <div class="timer-custom-row">
                <input type="number" id="timer-custom-min" placeholder="Min" min="1" max="999">
                <button class="btn-tool" id="btn-timer-custom-set">Set</button>
              </div>
              <div class="tool-controls" style="margin-top: 8px;">
                <button class="btn-tool" id="btn-timer-toggle">Start</button>
                <button class="btn-tool" id="btn-timer-reset">Reset</button>
              </div>
            </div>

            <div class="tool-widget" id="tool-alarm">
              <div class="tool-title">Alarms</div>
              <div class="alarm-create-row">
                <input type="time" id="alarm-time-input">
                <button class="btn-tool" id="btn-alarm-add">Add</button>
              </div>
              <div class="alarms-list" id="alarms-list">
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar-section-divider"></div>
        <div class="ist-clock" id="ist-clock">
          <div class="clock-label">IST</div>
          <div class="clock-time" id="clock-time">--:--</div>
        </div>
      </aside>
      <main class="main-content">
        <div class="reading-container">

          <div class="reading-metrics" id="reading-metrics" style="display: none;">
            <span id="metrics-time">-- min read</span>
            <span class="metrics-separator">·</span>
            <span id="metrics-words">0 words</span>
          </div>

          <article class="reading-content" id="reading-content">
          </article>
          <div class="empty-state" id="empty-state" style="display: none;">
            <svg class="empty-icon" viewBox="0 0 24 24">
              <path fill="currentColor"
                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
            </svg>
            <p>Paste markdown to begin</p>
            <button class="btn-primary" id="btn-empty-paste">Open Editor</button>
          </div>
          <div class="error-state" id="error-state" style="display: none;">
            <p id="error-message">The requested document could not be loaded.</p>
            <button class="btn-primary" id="btn-error-retry">Paste Markdown</button>
          </div>
          <div class="loading-state" id="loading-state" style="display: none;">
            <div class="spinner"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <input type="file" id="file-input" accept=".md" style="display: none;">
  <div class="paste-overlay" id="paste-overlay" aria-hidden="true">
    <div class="paste-modal">
      <div class="paste-header">
        <h2>Paste Markdown</h2>
        <button class="btn-close" id="btn-close-paste" aria-label="Close">
          <svg viewBox="0 0 24 24">
            <path fill="currentColor"
              d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" />
          </svg>
        </button>
      </div>
      <textarea id="markdown-input" placeholder="Paste your markdown here..."></textarea>
      <div class="paste-footer">
        <span class="keyboard-tip">Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to render</span>
        <div class="paste-actions">
          <button class="btn-secondary" id="btn-cancel-paste">Cancel</button>
          <button class="btn-primary" id="btn-render-paste" style="margin-top: 0;">Render</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast-notification" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>

</html>
